
        <!DOCTYPE html>
        <html>
        <head>
            <style>
                body { background: #0d1117; color: white; font-family: sans-serif; display: flex; justify-content: center; padding: 50px; }
                .dashboard { background: #161b22; padding: 30px; border-radius: 15px; border: 1px solid #30363d; width: 800px; }
                .chart-section { display: flex; justify-content: space-around; height: 300px; align-items: flex-end; margin-bottom: 60px; border-bottom: 2px solid #30363d; }
                .bar-group { display: flex; flex-direction: column; align-items: center; width: 100px; height: 100%; justify-content: flex-end; }
                .bar { width: 40px; border-radius: 5px 5px 0 0; transition: 0.3s; }
                .bar.dim { background: #58a6ff; box-shadow: 0 0 15px rgba(88, 166, 255, 0.3); }
                .bar.vel { background: #3fb950; box-shadow: 0 0 15px rgba(63, 185, 80, 0.3); }
                .bar-label { font-size: 12px; margin-bottom: 5px; font-weight: bold; }
                .loc-tag { font-size: 10px; color: #8b949e; margin-top: 10px; text-align: center; height: 30px; }
                h2 { color: #c9d1d9; font-size: 1.2rem; text-align: center; margin-top: 0; }
            </style>
        </head>
        <body>
            <div class="dashboard">
                <h2>Impacto por DIMENSIÓN (Masa)</h2>
                <div class="chart-section">
                <div class="bar-group">
                    <div class="bar-label">950.4</div>
                    <div class="bar dim" style="height: 95.03999999999999%"></div>
                    <div class="loc-tag">Monte Everest</div>
                </div>
                <div class="bar-group">
                    <div class="bar-label">-1978.39</div>
                    <div class="bar dim" style="height: 100%"></div>
                    <div class="loc-tag">Fosa de las Marianas</div>
                </div></div>

                <h2>Impacto por VELOCIDAD (Energía)</h2>
                <div class="chart-section">
                <div class="bar-group">
                    <div class="bar-label">3.99</div>
                    <div class="bar vel" style="height: 0.399%"></div>
                    <div class="loc-tag">Monte Everest</div>
                </div>
                <div class="bar-group">
                    <div class="bar-label">-8.3</div>
                    <div class="bar vel" style="height: 0.8300000000000001%"></div>
                    <div class="loc-tag">Fosa de las Marianas</div>
                </div></div>
            </div>
        </body>
        </html>
